<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Show QR properly */
        #qrcode {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Logo -->
    <img src="logo.png" class="logo" alt="Company Logo">

    <!-- Help Text -->
    <h2>Welcome to Our Product Portal</h2>
    <p>Please accept terms & conditions to continue.</p>

    <!-- Terms -->
    <div class="terms-box">
        <p>
            By proceeding, you agree to view product documents responsibly.
        </p>
    </div>

    <!-- Checkbox -->
    <input type="checkbox" id="accept">
    <label for="accept">I accept Terms & Conditions</label>

    <br><br>

    <!-- Button -->
    <button onclick="proceed()">Proceed</button>

    <!-- ✅ QR Code visible here -->
    <div id="qrcode"></div>
</div>

<script src="script.js"></script>

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    new QRCode(document.getElementById("qrcode"), {
        text: "https://markt99002-sketch.github.io/testmultiwood",
        width: 150,
        height: 150
    });
</script>
</body>
</html>
